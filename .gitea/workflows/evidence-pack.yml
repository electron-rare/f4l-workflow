name: Evidence Pack (type A)
on:
  workflow_dispatch:
    inputs:
      deliverable_id:
        required: true
        type: string
      compliance_profile:
        required: true
        default: "prototype"
        type: choice
        options: [prototype, iot_wifi_eu]

jobs:
  build-evidence:
    runs-on: self-hosted
    steps:
      - name: Stage demo artifacts
        run: |
          set -eux
          out="evidence"
          mkdir -p "$out"
          slug="${{ inputs.deliverable_id }}"
          profile="${{ inputs.compliance_profile }}"
          ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          cat > "$out/01_spec.md" <<MD
          # Deliverable $slug

          - compliance profile: **$profile**
          - built at: $ts

          ## Requirements

          1. The module **MUST** enumerate 16 cell channels over I2C.
          2. The firmware **SHOULD** expose a serial CLI at 115200 bps.
          3. Cells under 2.7V **MUST** be reported within 100 ms.
          MD

          printf '%s' '{"erc_version":"1.0","errors":[],"warnings":[{"code":"w101","severity":"warn","message":"Unconnected pin U3.NRST","net":"NRST"},{"code":"w202","severity":"warn","message":"Power input not flagged","net":"+3V3"}],"total":2}' > "$out/erc.json"

          printf '%s' '{"drc_version":"1.0","errors":0,"warnings":0,"notes":["Clearance 0.2mm OK","Silkscreen OK"]}' > "$out/drc.json"

          cat > "$out/bom.csv" <<CSV
          Designator,MPN,Value,Footprint,Qty,Supplier,Price
          U1,ESP32-S3-WROOM-1,ESP32-S3 module,WROOM,1,Mouser,5.90
          U2-U17,INA226AIDGSR,current sense,VSSOP10,16,Digi-Key,2.15
          Q1-Q16,AO3401A,p-mosfet,SOT23,16,LCSC,0.12
          C1-C40,CL10B104KB8NNNC,100n,0603,40,LCSC,0.01
          R1-R80,ERJ-3EKF1002V,10k 1%,0603,80,Mouser,0.02
          CSV

          printf '\x7FELF\x02\x01\x01\x00' > "$out/firmware.bin"
          dd if=/dev/urandom bs=1 count=1536 >> "$out/firmware.bin" 2>/dev/null || true

          cat > "$out/README.md" <<MD
          # Evidence pack for $slug

          Artifacts: \`01_spec.md\`, \`erc.json\`, \`drc.json\`, \`bom.csv\`, \`firmware.bin\`.
          Compliance profile: **$profile**.
          MD

          ls -la "$out"

      - name: Upload evidence artifact
        uses: actions/upload-artifact@v3
        with:
          name: evidence-${{ inputs.deliverable_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: 90
